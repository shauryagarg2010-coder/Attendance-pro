<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dailymint Admin</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#07070F;--s1:#0F0F1E;--s2:#141428;--b1:#1E1E32;--b2:#2A2A44;
  --t1:#F0F0FF;--t2:#9090B8;--t3:#5A5A80;--t4:#3A3A58;
  --green:#00FF87;--red:#FF6B6B;--blue:#38BDF8;--orange:#FB923C;--purple:#C084FC;--teal:#4ECDC4;
  --fn:'SF Pro Display',-apple-system,BlinkMacSystemFont,sans-serif;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--t1);font-family:var(--fn);font-size:15px;}

/* ── SCREENS ── */
.screen{position:fixed;inset:0;display:flex;flex-direction:column;transition:opacity 0.25s ease;}
.screen.hidden{opacity:0;pointer-events:none;}

/* ── AUTH ── */
#authScreen{align-items:center;justify-content:center;gap:18px;padding:32px;text-align:center;}
.auth-logo{font-size:2.8rem;font-weight:900;letter-spacing:-0.03em;color:var(--green);line-height:1;}
.auth-tag{font-size:0.72rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--t3);margin-bottom:8px;}
.google-btn{display:flex;align-items:center;justify-content:center;gap:10px;padding:14px 28px;background:#fff;color:#1F1F1F;border:none;border-radius:14px;font-family:var(--fn);font-size:0.85rem;font-weight:600;cursor:pointer;width:100%;max-width:280px;}
.auth-note{font-size:0.65rem;color:var(--t3);max-width:240px;line-height:1.7;}
#authErr{font-size:0.7rem;color:var(--red);display:none;padding:10px;background:rgba(255,107,107,0.08);border-radius:10px;width:100%;max-width:280px;text-align:center;}

/* ── TOPBAR ── */
.topbar{flex-shrink:0;padding:14px 18px 12px;background:var(--s1);border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:10px;}
.topbar-back{width:32px;height:32px;border:none;background:var(--b1);border-radius:10px;color:var(--t1);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.topbar-title{font-size:1rem;font-weight:800;flex:1;}
.topbar-pill{background:rgba(0,255,135,0.1);border:1px solid rgba(0,255,135,0.25);color:var(--green);font-size:0.6rem;font-weight:700;letter-spacing:0.08em;padding:4px 10px;border-radius:999px;}
.topbar-signout{font-size:0.62rem;color:var(--t3);background:none;border:1px solid var(--b2);border-radius:8px;padding:5px 10px;cursor:pointer;}

/* ── SCROLLABLE BODY ── */
.scroll-body{flex:1;overflow-y:auto;min-height:0;}

/* ── SUMMARY STRIP ── */
.summary-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--b1);border-bottom:1px solid var(--b1);}
.sum-cell{background:var(--s1);padding:12px 8px;text-align:center;}
.sum-num{font-size:1.3rem;font-weight:800;color:var(--t1);}
.sum-num.green{color:var(--green);}
.sum-num.orange{color:var(--orange);}
.sum-num.blue{color:var(--blue);}
.sum-lbl{font-size:0.52rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--t3);margin-top:2px;}

/* ── FILTER BAR ── */
.filter-bar{display:flex;gap:6px;padding:12px 14px;overflow-x:auto;border-bottom:1px solid var(--b1);background:var(--s1);}
.filter-bar::-webkit-scrollbar{display:none;}
.filter-btn{flex-shrink:0;padding:6px 14px;border-radius:999px;border:1px solid var(--b2);background:none;color:var(--t2);font-family:var(--fn);font-size:0.65rem;font-weight:600;cursor:pointer;white-space:nowrap;transition:all 0.15s;}
.filter-btn.active{background:var(--green);border-color:var(--green);color:#000;}

/* ── USER CARDS ── */
.cards-grid{padding:12px;display:flex;flex-direction:column;gap:10px;}
.user-card{background:var(--s1);border:1px solid var(--b1);border-radius:16px;padding:14px 16px;cursor:pointer;transition:border-color 0.15s,background 0.15s;position:relative;overflow:hidden;}
.user-card:active{background:var(--s2);}
.user-card-top{display:flex;align-items:center;gap:12px;}
.user-num{width:40px;height:40px;border-radius:12px;background:var(--b1);display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:800;color:var(--t2);flex-shrink:0;letter-spacing:0.03em;}
.user-card-info{flex:1;min-width:0;}
.user-card-name{font-size:0.88rem;font-weight:700;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.user-card-email{font-size:0.62rem;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.reg-badge{flex-shrink:0;padding:4px 10px;border-radius:999px;font-size:0.58rem;font-weight:700;letter-spacing:0.06em;}
.reg-daily{background:rgba(0,255,135,0.12);color:var(--green);border:1px solid rgba(0,255,135,0.3);}
.reg-regular{background:rgba(78,205,196,0.12);color:var(--teal);border:1px solid rgba(78,205,196,0.3);}
.reg-occasional{background:rgba(251,146,60,0.12);color:var(--orange);border:1px solid rgba(251,146,60,0.3);}
.reg-inactive{background:rgba(255,107,107,0.10);color:var(--red);border:1px solid rgba(255,107,107,0.25);}
.reg-new{background:rgba(192,132,252,0.12);color:var(--purple);border:1px solid rgba(192,132,252,0.3);}
.user-card-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:0;margin-top:12px;border-top:1px solid var(--b1);padding-top:10px;}
.cs{text-align:center;}
.cs-val{font-size:0.88rem;font-weight:700;color:var(--t1);}
.cs-lbl{font-size:0.52rem;letter-spacing:0.06em;text-transform:uppercase;color:var(--t3);margin-top:1px;}
.eng-bar-wrap{margin-top:10px;}
.eng-bar-bg{height:3px;background:var(--b2);border-radius:2px;overflow:hidden;}
.eng-bar-fill{height:100%;border-radius:2px;transition:width 0.6s ease;}
.eng-label{display:flex;justify-content:space-between;margin-bottom:3px;}
.eng-label span:first-child{font-size:0.55rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--t3);}
.eng-label span:last-child{font-size:0.6rem;font-weight:700;}
.card-arrow{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--t4);font-size:1.1rem;}
.empty-state{text-align:center;padding:60px 20px;color:var(--t3);font-size:0.82rem;}
.spinner{width:28px;height:28px;border:3px solid var(--b2);border-top-color:var(--green);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 14px;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── USER DETAIL ── */
#detailScreen .scroll-body{padding-bottom:24px;}
.detail-hero{padding:20px 18px 16px;background:var(--s1);border-bottom:1px solid var(--b1);}
.detail-user-row{display:flex;align-items:center;gap:14px;margin-bottom:14px;}
.detail-avatar{width:52px;height:52px;border-radius:16px;object-fit:cover;background:var(--b2);flex-shrink:0;}
.detail-avatar-ph{width:52px;height:52px;border-radius:16px;background:var(--b1);display:flex;align-items:center;justify-content:center;font-size:1.2rem;color:var(--t3);flex-shrink:0;}
.detail-name{font-size:1.1rem;font-weight:800;color:var(--t1);}
.detail-email{font-size:0.65rem;color:var(--t3);margin-top:2px;}
.detail-num{font-size:0.6rem;font-weight:700;letter-spacing:0.1em;color:var(--t3);text-transform:uppercase;margin-top:3px;}
.detail-badges{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}

/* ── DETAIL SECTIONS ── */
.detail-section{padding:14px 18px;}
.det-sec-title{font-size:0.58rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--t3);margin-bottom:10px;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.info-cell{background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:10px 12px;}
.info-cell-lbl{font-size:0.55rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--t3);margin-bottom:3px;}
.info-cell-val{font-size:0.8rem;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.info-cell-val.green{color:var(--green);}
.info-cell-val.orange{color:var(--orange);}
.info-cell-val.red{color:var(--red);}

/* ── ACTIVITY HEATMAP ── */
.heatmap-wrap{background:var(--s1);border:1px solid var(--b1);border-radius:14px;padding:14px;}
.heatmap-row{display:flex;gap:3px;flex-wrap:wrap;}
.hm-cell{width:calc((100% - 87px) / 30);aspect-ratio:1;border-radius:3px;background:var(--b1);}
.hm-full{background:var(--green);opacity:0.9;}
.hm-partial{background:var(--orange);opacity:0.7;}
.hm-active{background:var(--blue);opacity:0.5;}
.heatmap-legend{display:flex;gap:12px;margin-top:8px;font-size:0.58rem;color:var(--t3);}
.heatmap-legend span{display:flex;align-items:center;gap:4px;}
.hm-dot{width:8px;height:8px;border-radius:2px;}

/* ── STATS ROW ── */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.stat-box{background:var(--s1);border:1px solid var(--b1);border-radius:14px;padding:14px 12px;text-align:center;}
.stat-box-num{font-size:1.5rem;font-weight:800;}
.stat-box-lbl{font-size:0.56rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--t3);margin-top:3px;}

/* ── HABITS BREAKDOWN ── */
.habit-row{background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:11px 14px;display:flex;align-items:center;gap:10px;margin-bottom:7px;}
.habit-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.habit-name{flex:1;font-size:0.8rem;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.habit-pct{font-size:0.72rem;font-weight:700;flex-shrink:0;}
.habit-bar-wrap{width:60px;flex-shrink:0;}
.habit-bar-bg{height:4px;background:var(--b2);border-radius:2px;overflow:hidden;}
.habit-bar-fill{height:100%;border-radius:2px;}
.habit-paused{font-size:0.55rem;color:var(--t3);background:var(--b1);padding:2px 6px;border-radius:6px;}

/* ── TIME ANALYSIS ── */
.time-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.time-cell{background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:12px;}
.time-val{font-size:1rem;font-weight:700;color:var(--t1);}
.time-lbl{font-size:0.58rem;color:var(--t3);margin-top:2px;line-height:1.4;}
.dow-row{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:10px;}
.dow-cell{background:var(--b1);border-radius:6px;padding:6px 2px;text-align:center;}
.dow-cell-day{font-size:0.52rem;color:var(--t3);margin-bottom:3px;}
.dow-cell-bar{height:24px;border-radius:4px;background:var(--b2);overflow:hidden;position:relative;}
.dow-cell-fill{position:absolute;bottom:0;left:0;right:0;border-radius:4px;}
.dow-cell-count{font-size:0.58rem;font-weight:700;margin-top:3px;}

/* ── ACCESS DENIED ── */
.access-card{background:rgba(255,107,107,0.07);border:1px solid rgba(255,107,107,0.25);border-radius:14px;padding:20px;text-align:center;margin:20px;}
.access-card h3{color:var(--red);margin-bottom:8px;font-size:0.9rem;}
.access-card p{font-size:0.72rem;color:var(--t3);line-height:1.7;}
.uid-box{background:var(--b1);border-radius:8px;padding:8px 12px;font-family:monospace;font-size:0.75rem;color:var(--t1);word-break:break-all;margin-top:10px;text-align:left;}
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div class="screen" id="authScreen">
  <div class="auth-logo">Dailymint</div>
  <div class="auth-tag">Admin Dashboard</div>
  <button class="google-btn" id="adminSignInBtn">
    <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84c-.21 1.12-.84 2.07-1.8 2.71v2.26h2.91c1.7-1.57 2.69-3.88 2.69-6.61z"/><path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.91-2.26c-.8.55-1.84.86-3.05.86-2.35 0-4.34-1.58-5.05-3.71H.96v2.33C2.44 15.98 5.48 18 9 18z"/><path fill="#FBBC05" d="M3.95 10.71c-.18-.55-.28-1.13-.28-1.71s.1-1.16.28-1.71V4.96H.96A8.997 8.997 0 0 0 0 9c0 1.45.35 2.83.96 4.04l2.99-2.33z"/><path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58C13.46.89 11.43 0 9 0 5.48 0 2.44 2.02.96 4.96l2.99 2.33C4.66 5.16 6.65 3.58 9 3.58z"/></svg>
    Sign in with Google
  </button>
  <div class="auth-note">Only your authorised Google account can access user data. Others get access denied.</div>
  <div id="authErr"></div>
</div>

<!-- DASHBOARD SCREEN -->
<div class="screen hidden" id="dashScreen">
  <div class="topbar">
    <div class="topbar-title">All Users</div>
    <div id="userCountPill" class="topbar-pill">— users</div>
    <button class="topbar-signout" id="dashSignOut">Sign Out</button>
  </div>
  <div class="summary-strip">
    <div class="sum-cell"><div class="sum-num green" id="sTotal">—</div><div class="sum-lbl">Total</div></div>
    <div class="sum-cell"><div class="sum-num blue" id="sActive">—</div><div class="sum-lbl">Active 7d</div></div>
    <div class="sum-cell"><div class="sum-num orange" id="sStreak">—</div><div class="sum-lbl">Avg Streak</div></div>
    <div class="sum-cell"><div class="sum-num" id="sPWA">—</div><div class="sum-lbl">Installed</div></div>
  </div>
  <div class="filter-bar" id="filterBar">
    <button class="filter-btn active" data-f="all">All</button>
    <button class="filter-btn" data-f="daily">Daily Active</button>
    <button class="filter-btn" data-f="regular">Regular</button>
    <button class="filter-btn" data-f="occasional">Occasional</button>
    <button class="filter-btn" data-f="inactive">Inactive</button>
    <button class="filter-btn" data-f="new">New Users</button>
  </div>
  <div class="scroll-body"><div class="cards-grid" id="cardsGrid"><div class="empty-state"><div class="spinner"></div>Loading users…</div></div></div>
</div>

<!-- USER DETAIL SCREEN -->
<div class="screen hidden" id="detailScreen">
  <div class="topbar">
    <button class="topbar-back" id="backBtn">←</button>
    <div class="topbar-title" id="detailTopTitle">User</div>
  </div>
  <div class="scroll-body" id="detailBody"></div>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import{getAuth,GoogleAuthProvider,signInWithPopup,signOut,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
import{getFirestore,collection,getDocs}from"https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const cfg={apiKey:"AIzaSyCwdw9r8qNZkJwzHr52LotZokswb5icSNs",authDomain:"dailymint-app.firebaseapp.com",projectId:"dailymint-app",storageBucket:"dailymint-app.firebasestorage.app",messagingSenderId:"980687929996",appId:"1:980687929996:web:4aeffcc6be82e3dfddb1a9"};
const app=initializeApp(cfg),auth=getAuth(app),db=getFirestore(app),prov=new GoogleAuthProvider();

let allUsers=[],currentFilter='all';

// ── HELPERS ─────────────────────────────────────────────────────
const fmtDate=ts=>{if(!ts)return'Never';let d=new Date(typeof ts==='number'?ts:ts.seconds*1000);return d.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'2-digit'});};
const daysSince=ts=>{if(!ts)return 9999;let ms=typeof ts==='number'?ts:ts.seconds*1000;return Math.floor((Date.now()-ms)/86400000);};
const last30Days=()=>{let a=[],d=new Date();for(let i=29;i>=0;i--){let x=new Date(d);x.setDate(d.getDate()-i);a.push(x.toISOString().slice(0,10));}return a;};
const last7Days=()=>{let a=[],d=new Date();for(let i=6;i>=0;i--){let x=new Date(d);x.setDate(d.getDate()-i);a.push(x.toISOString().slice(0,10));}return a;};
const todayStr=()=>new Date().toISOString().slice(0,10);

function parseDevice(ua){if(!ua)return'Unknown';if(/Android/.test(ua))return'Android';if(/iPhone|iPad/.test(ua))return'iOS';if(/Windows/.test(ua))return'Windows';if(/Mac/.test(ua))return'Mac';return'Other';}
function parseBrowser(ua){if(!ua)return'';if(/Chrome/.test(ua)&&!/Edg/.test(ua))return'Chrome';if(/Firefox/.test(ua))return'Firefox';if(/Safari/.test(ua)&&!/Chrome/.test(ua))return'Safari';return'';}
function tzToCountry(tz){if(!tz)return'—';const m={'Asia/Kolkata':'India','Asia/Calcutta':'India','America/New_York':'USA','America/Los_Angeles':'USA','America/Chicago':'USA','Europe/London':'UK','Europe/Berlin':'Germany','Europe/Paris':'France','Asia/Dubai':'UAE','Asia/Singapore':'Singapore','Asia/Tokyo':'Japan','Australia/Sydney':'Australia','Asia/Karachi':'Pakistan','Asia/Dhaka':'Bangladesh','Asia/Colombo':'Sri Lanka','America/Toronto':'Canada'};return m[tz]||(tz.split('/').pop().replace(/_/g,' '));}

function getRegularity(u){
  const d=daysSince(u.lastSeen);
  const age=daysSince(u.firstSeen);
  if(age<=3)return{key:'new',label:'New User',cls:'reg-new'};
  if(d<=1)return{key:'daily',label:'Daily Active',cls:'reg-daily'};
  if(d<=7)return{key:'regular',label:'Regular',cls:'reg-regular'};
  if(d<=30)return{key:'occasional',label:'Occasional',cls:'reg-occasional'};
  return{key:'inactive',label:'Inactive',cls:'reg-inactive'};
}

function getCompsOnDate(raw,date){
  const c=raw.comps||{};
  return c[date]?Object.keys(c[date]).length:0;
}
function activeDays30(raw){
  return last30Days().filter(d=>getCompsOnDate(raw,d)>0).length;
}
function activeDays7(raw){
  return last7Days().filter(d=>getCompsOnDate(raw,d)>0).length;
}
function bestDayOfWeek(raw){
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const counts=[0,0,0,0,0,0,0];
  Object.keys(raw.comps||{}).forEach(d=>{const dow=new Date(d+'T12:00:00').getDay();counts[dow]++;});
  const max=Math.max(...counts);
  return max===0?'—':days[counts.indexOf(max)];
}
function dowCounts(raw){
  const counts=[0,0,0,0,0,0,0];
  Object.keys(raw.comps||{}).forEach(d=>{const dow=new Date(d+'T12:00:00').getDay();counts[dow]++;});
  return counts;
}
function totalCompletions(raw){
  let n=0;
  Object.values(raw.comps||{}).forEach(dc=>{if(typeof dc==='object')n+=Object.keys(dc).length;});
  return n;
}
function habitPct30(raw,taskId){
  const days=last30Days().filter(d=>{const c=raw.comps||{};return c[d]&&c[d][taskId];}).length;
  return Math.round((days/30)*100);
}
function calcEngagement(raw,u){
  const ad=activeDays30(raw);
  const reg=(ad/30)*100;
  const tc=totalCompletions(raw);
  const possible=ad*(u.habits||0);
  const compRate=possible>0?Math.min((tc/possible)*100,100):0;
  const streak=Math.min(u.streak,30)/30*100;
  const habits=Math.min(u.habits,10)/10*100;
  return Math.round(reg*0.35+compRate*0.25+streak*0.25+habits*0.15);
}
function engColor(score){if(score>=70)return'var(--green)';if(score>=40)return'var(--orange)';return'var(--red)';}

// ── Session helpers ─────────────────────────────────────────────
function fmtHour(h){if(h===null||h===undefined)return'—';var ampm=h>=12?'PM':'AM';var h12=h%12||12;return h12+' '+ampm;}
function fmtDuration(mins){if(mins===null||mins===undefined||mins===0)return'—';if(mins<1)return'<1 min';return mins+' min';}

// ── LOAD USERS ───────────────────────────────────────────────────
async function loadUsers(){
  document.getElementById('cardsGrid').innerHTML='<div class="empty-state"><div class="spinner"></div>Loading users…</div>';
  try{
    const snap=await getDocs(collection(db,'users'));
    const rawMap={};
    snap.forEach(doc=>{rawMap[doc.id]=doc.data();});

    allUsers=Object.entries(rawMap).map(([uid,d])=>{
      const habits=(d.tasks||[]).filter(t=>!t.paused&&t.type!=='circle').length;
      const streak=d.stats?.currentStreak||0;
      const comp=totalCompletions(d);
      const ad30=activeDays30(d);
      const eng=calcEngagement(d,{habits,streak});
      return{
        uid,raw:d,
        name:d.displayName||d.profile?.name||'',
        email:d.email||'',
        photo:d.photoURL||'',
        firstSeen:d.firstSeen||d.updatedAt||null,
        lastSeen:d.lastSeen||d.updatedAt||null,
        sessions:d.sessionCount||1,
        habits,streak,comp,ad30,eng,
        pwa:d.pwaInstalled||false,
        device:parseDevice(d.device?.userAgent),
        browser:parseBrowser(d.device?.userAgent),
        language:d.device?.language||'',
        timezone:d.device?.timezone||'',
        country:tzToCountry(d.device?.timezone),
        screenW:d.device?.screenW||'',
        screenH:d.device?.screenH||'',
        theme:d.profile?.theme||'—',
        lastSessionDuration:d.lastSessionDuration||null,
        lastSessionHour:typeof d.lastSessionHour==='number'?d.lastSessionHour:null,
        lastSessionDate:d.lastSessionDate||null,
        isAnonymous:d.isAnonymous!==false||(d.email===''&&!d.displayName)
      };
    });

    // Sort by firstSeen — oldest = User #1
    allUsers.sort((a,b)=>(a.firstSeen||Infinity)-(b.firstSeen||Infinity));
    allUsers.forEach((u,i)=>u.userNum=i+1);

    updateSummary();
    renderCards();
  }catch(e){
    document.getElementById('cardsGrid').innerHTML=`
      <div class="access-card">
        <h3>⛔ Access Denied</h3>
        <p>Your account is not authorised as admin. Update Firestore security rules with your UID below.</p>
        <div class="uid-box">Your UID: ${auth.currentUser?.uid||'—'}</div>
      </div>`;
  }
}

function updateSummary(){
  const n=allUsers.length;
  const a7=allUsers.filter(u=>daysSince(u.lastSeen)<=7).length;
  const avgS=n?Math.round(allUsers.reduce((a,u)=>a+u.streak,0)/n):0;
  const pwa=allUsers.filter(u=>u.pwa).length;
  document.getElementById('sTotal').textContent=n;
  document.getElementById('sActive').textContent=a7;
  document.getElementById('sStreak').textContent=avgS+'d';
  document.getElementById('sPWA').textContent=pwa;
  document.getElementById('userCountPill').textContent=n+' user'+(n!==1?'s':'');
}

// ── RENDER CARDS ─────────────────────────────────────────────────
function renderCards(){
  const list=allUsers.filter(u=>{
    const reg=getRegularity(u);
    if(currentFilter==='all')return true;
    return reg.key===currentFilter;
  });
  if(!list.length){
    document.getElementById('cardsGrid').innerHTML='<div class="empty-state">No users in this category.</div>';
    return;
  }
  document.getElementById('cardsGrid').innerHTML=list.map(u=>{
    const reg=getRegularity(u);
    const dispName=u.isAnonymous?'Anonymous User #'+u.userNum:(u.name||'User #'+u.userNum);
    const dispEmail=u.isAnonymous?'Skipped Google sign-in':(u.email||'No email');
    const lastActive=daysSince(u.lastSeen);
    const lastStr=lastActive===0?'Today':lastActive===1?'Yesterday':lastActive+'d ago';
    const ecol=engColor(u.eng);
    return`<div class="user-card" onclick="openUser(${u.userNum-1})">
      <div class="user-card-top">
        <div class="user-num">#${u.userNum}</div>
        <div class="user-card-info">
          <div class="user-card-name">${esc(dispName)}</div>
          <div class="user-card-email">${esc(dispEmail)}</div>
        </div>
        <div class="reg-badge ${reg.cls}">${reg.label}</div>
      </div>
      <div class="user-card-stats">
        <div class="cs"><div class="cs-val">${lastStr}</div><div class="cs-lbl">Last Active</div></div>
        <div class="cs"><div class="cs-val">${u.streak}d</div><div class="cs-lbl">Streak</div></div>
        <div class="cs"><div class="cs-val">${fmtDuration(u.lastSessionDuration)}</div><div class="cs-lbl">Session</div></div>
        <div class="cs"><div class="cs-val">${u.habits}</div><div class="cs-lbl">Habits</div></div>
      </div>
      <div class="eng-bar-wrap">
        <div class="eng-label"><span>Engagement</span><span style="color:${ecol}">${u.eng}%</span></div>
        <div class="eng-bar-bg"><div class="eng-bar-fill" style="width:${u.eng}%;background:${ecol}"></div></div>
      </div>
    </div>`;
  }).join('');
}

// ── USER DETAIL ───────────────────────────────────────────────────
window.openUser=function(idx){
  const u=allUsers[idx];
  if(!u)return;
  const raw=u.raw;
  const reg=getRegularity(u);
  const dispName=u.isAnonymous?'Anonymous User #'+u.userNum:(u.name||'User #'+u.userNum);
  const dispEmail=u.isAnonymous?'Skipped Google sign-in':(u.email||'No email');
  document.getElementById('detailTopTitle').textContent='User #'+u.userNum;
  show('detailScreen');

  // 30-day heatmap
  const taskCount=(raw.tasks||[]).filter(t=>!t.paused&&t.type!=='circle').length;
  const hmHtml=last30Days().map(d=>{
    const done=getCompsOnDate(raw,d);
    const full=taskCount>0&&done>=taskCount;
    const partial=done>0&&!full;
    let cls=full?'hm-cell hm-full':partial?'hm-cell hm-partial':'hm-cell';
    return`<div class="${cls}" title="${d}: ${done} completions"></div>`;
  }).join('');

  // Habits breakdown
  const tasks=(raw.tasks||[]).filter(t=>t.type!=='circle');
  const habitsHtml=tasks.length?tasks.map(t=>{
    const pct=habitPct30(raw,t.id);
    const color=t.color||'#00FF87';
    return`<div class="habit-row">
      <div class="habit-dot" style="background:${color}"></div>
      <div class="habit-name">${esc(t.name||'Unnamed')}</div>
      ${t.paused?'<div class="habit-paused">Paused</div>':''}
      <div class="habit-bar-wrap"><div class="eng-label" style="margin-bottom:2px"><span style="font-size:0.6rem;color:var(--t3)"></span><span style="font-size:0.65rem;font-weight:700;color:${color}">${pct}%</span></div><div class="habit-bar-bg"><div class="habit-bar-fill" style="width:${pct}%;background:${color}"></div></div></div>
    </div>`;
  }).join(''):'<div class="empty-state" style="padding:20px">No habits added yet</div>';

  // Day of week breakdown
  const dow=dowCounts(raw);
  const dowMax=Math.max(...dow,1);
  const dowDays=['S','M','T','W','T','F','S'];
  const dowHtml=dow.map((c,i)=>`<div class="dow-cell">
    <div class="dow-cell-day">${dowDays[i]}</div>
    <div class="dow-cell-bar"><div class="dow-cell-fill" style="height:${Math.round((c/dowMax)*100)}%;background:var(--green);opacity:0.7"></div></div>
    <div class="dow-cell-count" style="color:${c>0?'var(--t1)':'var(--t4)'}">${c||''}</div>
  </div>`).join('');

  // Time analysis values
  const avgPerWeek=u.sessions&&u.firstSeen?((u.sessions/Math.max(1,Math.ceil(daysSince(u.firstSeen)/7)))).toFixed(1):'—';
  const daysSinceJoin=daysSince(u.firstSeen);
  const activePct=daysSinceJoin>0?Math.round((u.ad30/Math.min(30,daysSinceJoin))*100):0;

  document.getElementById('detailBody').innerHTML=`
    <div class="detail-hero">
      <div class="detail-user-row">
        ${u.photo?`<img class="detail-avatar" src="${u.photo}" onerror="this.style.display='none'">`:`<div class="detail-avatar-ph">${(dispName[0]||'?').toUpperCase()}</div>`}
        <div style="flex:1;min-width:0">
          <div class="detail-name">${esc(dispName)}</div>
          <div class="detail-email">${esc(dispEmail)}</div>
          <div class="detail-num">User #${u.userNum} · Joined ${fmtDate(u.firstSeen)}</div>
        </div>
      </div>
      <div class="detail-badges">
        <div class="reg-badge ${reg.cls}">${reg.label}</div>
        <div class="reg-badge reg-regular" style="background:transparent;border-color:var(--b2);color:var(--t2)">Score ${u.eng}%</div>
        ${u.pwa?`<div class="reg-badge reg-daily">PWA Installed</div>`:''}
      </div>
    </div>

    <div class="detail-section">
      <div class="det-sec-title">Quick Info</div>
      <div class="info-grid">
        <div class="info-cell"><div class="info-cell-lbl">Last Active</div><div class="info-cell-val ${daysSince(u.lastSeen)<=1?'green':daysSince(u.lastSeen)>14?'red':''}">${daysSince(u.lastSeen)===0?'Today':daysSince(u.lastSeen)===1?'Yesterday':daysSince(u.lastSeen)+'d ago'}</div></div>
        <div class="info-cell"><div class="info-cell-lbl">Total Sessions</div><div class="info-cell-val">${u.sessions}</div></div>
        <div class="info-cell"><div class="info-cell-lbl">Device</div><div class="info-cell-val">${u.device} ${u.browser?'/ '+u.browser:''}</div></div>
        <div class="info-cell"><div class="info-cell-lbl">Country</div><div class="info-cell-val">${u.country}</div></div>
        <div class="info-cell"><div class="info-cell-lbl">Language</div><div class="info-cell-val">${u.language||'—'}</div></div>
        <div class="info-cell"><div class="info-cell-lbl">Theme</div><div class="info-cell-val">${u.theme}</div></div>
        <div class="info-cell"><div class="info-cell-lbl">Last Session</div><div class="info-cell-val">${fmtDuration(u.lastSessionDuration)}</div></div>
        <div class="info-cell"><div class="info-cell-lbl">Typical Open Time</div><div class="info-cell-val">${fmtHour(u.lastSessionHour)}</div></div>
        <div class="info-cell"><div class="info-cell-lbl">Last Session Date</div><div class="info-cell-val">${u.lastSessionDate||'—'}</div></div>
      </div>
    </div>

    <div class="detail-section">
      <div class="det-sec-title">30-Day Activity — active ${u.ad30} of 30 days</div>
      <div class="heatmap-wrap">
        <div class="heatmap-row">${hmHtml}</div>
        <div class="heatmap-legend">
          <span><div class="hm-dot" style="background:var(--green);opacity:0.9"></div>All done</span>
          <span><div class="hm-dot" style="background:var(--orange);opacity:0.7"></div>Partial</span>
          <span><div class="hm-dot" style="background:var(--b2)"></div>Inactive</span>
        </div>
      </div>
    </div>

    <div class="detail-section">
      <div class="det-sec-title">Stats</div>
      <div class="stats-row">
        <div class="stat-box"><div class="stat-box-num" style="color:var(--green)">${u.streak}d</div><div class="stat-box-lbl">Current Streak</div></div>
        <div class="stat-box"><div class="stat-box-num" style="color:var(--orange)">${u.comp}</div><div class="stat-box-lbl">Total Done</div></div>
        <div class="stat-box"><div class="stat-box-num" style="color:var(--blue)">${u.habits}</div><div class="stat-box-lbl">Active Habits</div></div>
      </div>
    </div>

    <div class="detail-section">
      <div class="det-sec-title">Time Analysis</div>
      <div class="time-grid">
        <div class="time-cell"><div class="time-val">${avgPerWeek}x</div><div class="time-lbl">Avg sessions per week</div></div>
        <div class="time-cell"><div class="time-val">${activePct}%</div><div class="time-lbl">Days active since joining</div></div>
        <div class="time-cell"><div class="time-val">${bestDayOfWeek(raw)}</div><div class="time-lbl">Best day of week</div></div>
        <div class="time-cell"><div class="time-val">${daysSinceJoin}d</div><div class="time-lbl">Days since joining</div></div>
      </div>
      <div class="det-sec-title" style="margin-top:14px">Active Days by Weekday</div>
      <div class="dow-row">${dowHtml}</div>
    </div>

    <div class="detail-section">
      <div class="det-sec-title">Habits Breakdown — 30 day completion rate</div>
      ${habitsHtml}
    </div>
  `;
  document.getElementById('detailBody').scrollTop=0;
};

// ── FILTER ───────────────────────────────────────────────────────
document.getElementById('filterBar').addEventListener('click',e=>{
  const btn=e.target.closest('.filter-btn');
  if(!btn)return;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter=btn.dataset.f;
  renderCards();
});

// ── NAV ──────────────────────────────────────────────────────────
function show(id){document.querySelectorAll('.screen').forEach(s=>{s.classList.toggle('hidden',s.id!==id);});}
document.getElementById('backBtn').addEventListener('click',()=>{show('dashScreen');});
document.getElementById('dashSignOut').addEventListener('click',()=>signOut(auth));

// ── AUTH ─────────────────────────────────────────────────────────
document.getElementById('adminSignInBtn').addEventListener('click',()=>{
  signInWithPopup(auth,prov).catch(e=>{const el=document.getElementById('authErr');el.textContent='Failed: '+e.message;el.style.display='block';});
});
onAuthStateChanged(auth,user=>{
  if(user){show('dashScreen');loadUsers();}
  else{show('authScreen');allUsers=[];}
});

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>
</body>
</html>
